<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radyoloji Pulse — Makale Radarı</title>
<meta name="description" content="Son 7 günün radyoloji literatürü, etki skoruyla sıralı. Kaynak: PubMed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1016; --bg2:#0e151d; --panel:#141d27; --panel2:#19242f;
    --line:#22303d; --line2:#2c3d4d;
    --text:#e6edf3; --muted:#94a6b6; --faint:#5f7387;
    --accent:#46cfe0;            /* PACS overlay cyan */
    --accent-dim:#1f5560;
    --gold:#f2b24a;              /* Tier 1 — sıcak/önemli */
    --gold-dim:#5a4422;
    --t2:#46cfe0; --t3:#7488a0;
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --r:10px;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--bg);color:var(--text);font-family:var(--body);
    line-height:1.5;font-size:15px;
    background-image:radial-gradient(1200px 600px at 80% -10%, #11202b 0%, transparent 60%);
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px}

  /* ---------- Header ---------- */
  header{padding:40px 0 0}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{
    font-family:var(--display);font-weight:700;font-size:clamp(28px,6vw,44px);
    letter-spacing:-.02em;margin:0;line-height:1;
  }
  .brand h1 .accent{color:var(--accent)}
  .brand .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--faint);
    text-transform:uppercase;
  }
  .tagline{color:var(--muted);margin:14px 0 0;max-width:54ch}
  /* signature: window/level grayscale ramp */
  .ramp{height:6px;margin:20px 0 0;border-radius:3px;
    background:linear-gradient(90deg,#000,#3a4a58 35%,#9fb2c2 70%,#fff);
    box-shadow:inset 0 0 0 1px var(--line);}
  .stats{display:flex;gap:26px;flex-wrap:wrap;margin:22px 0 0;
    padding:16px 0 0;border-top:1px solid var(--line)}
  .stat .n{font-family:var(--display);font-weight:600;font-size:24px;line-height:1}
  .stat .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint);margin-top:6px}
  .stat.gold .n{color:var(--gold)}

  /* ---------- Controls ---------- */
  .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;
    margin:30px 0 18px;position:sticky;top:0;z-index:5;
    padding:14px 0;background:linear-gradient(var(--bg) 70%,transparent)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:12px;letter-spacing:.04em;
    padding:7px 13px;border-radius:999px;border:1px solid var(--line2);
    background:var(--panel);color:var(--muted);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--text)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);
    color:#04181c;font-weight:500}
  .search{flex:1;min-width:180px}
  .search input{width:100%;font-family:var(--body);font-size:14px;color:var(--text);
    background:var(--panel);border:1px solid var(--line2);border-radius:999px;
    padding:9px 16px;outline:none;transition:.15s}
  .search input:focus{border-color:var(--accent)}
  .search input::placeholder{color:var(--faint)}

  /* ---------- Worklist ---------- */
  .list{display:flex;flex-direction:column;gap:14px;padding-bottom:60px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);
    border-left:3px solid var(--t3);border-radius:var(--r);padding:18px 20px 16px;
    transition:transform .15s,border-color .15s,background .15s;animation:rise .4s both}
  .card:hover{transform:translateY(-2px);background:var(--panel2);border-left-color:var(--accent)}
  .card.t1{border-left-color:var(--gold)}
  .card.t2{border-left-color:var(--t2)}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .top{display:flex;gap:14px;align-items:flex-start}
  .rank{font-family:var(--mono);font-size:13px;color:var(--faint);
    padding-top:2px;min-width:30px;font-weight:500}
  .head{flex:1;min-width:0}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border-radius:5px;
    margin-bottom:9px;border:1px solid}
  .badge.t1{color:var(--gold);border-color:var(--gold-dim);background:#1d1708}
  .badge.t2{color:var(--accent);border-color:var(--accent-dim);background:#08222a}
  .badge.t3{color:var(--t3);border-color:var(--line2);background:var(--bg2)}
  .title{font-family:var(--display);font-weight:600;font-size:18px;
    letter-spacing:-.01em;line-height:1.3;margin:0;color:var(--text)}
  .title a:hover{color:var(--accent)}
  .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin:9px 0 0;
    display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .meta .j{color:var(--accent)}
  .meta .dot{color:var(--faint)}
  .authors{color:var(--faint);font-size:13px;margin:8px 0 0}
  .ptypes{display:flex;gap:6px;flex-wrap:wrap;margin:11px 0 0}
  .pt{font-family:var(--mono);font-size:10.5px;color:var(--muted);
    padding:2px 7px;border:1px solid var(--line2);border-radius:4px}
  .abstract{color:var(--muted);font-size:13.5px;margin:12px 0 0;
    max-height:0;overflow:hidden;transition:max-height .25s ease}
  .abstract.open{max-height:600px}
  .toggle{font-family:var(--mono);font-size:11px;color:var(--accent);
    background:none;border:none;cursor:pointer;padding:10px 0 0;letter-spacing:.05em}
  .toggle:hover{text-decoration:underline}

  /* score gauge — signal intensity bar */
  .gauge{display:flex;align-items:center;gap:10px;margin:14px 0 0}
  .bar{flex:1;height:5px;border-radius:3px;background:var(--bg2);
    border:1px solid var(--line);overflow:hidden}
  .fill{height:100%;border-radius:3px;
    background:linear-gradient(90deg,var(--accent-dim),var(--accent))}
  .card.t1 .fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
  .sval{font-family:var(--mono);font-size:12px;color:var(--muted);min-width:42px;text-align:right}

  /* states */
  .state{text-align:center;padding:60px 20px;color:var(--muted)}
  .state h3{font-family:var(--display);color:var(--text);font-weight:600}
  .state code{font-family:var(--mono);font-size:12px;background:var(--panel);
    padding:3px 7px;border-radius:5px;border:1px solid var(--line2);color:var(--accent)}

  .loadbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 0 6px}
  .loadbar .hint{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .loadbar .chip{cursor:pointer}
  footer{border-top:1px solid var(--line);padding:26px 0 50px;margin-top:20px;
    color:var(--faint);font-size:13px;display:flex;justify-content:space-between;
    flex-wrap:wrap;gap:10px}
  footer a:hover{color:var(--accent)}

  @media (max-width:560px){
    .stats{gap:20px}
    .rank{min-width:24px;font-size:12px}
    .title{font-size:16.5px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="eyebrow">Makale Radarı</span>
    </div>
    <div class="brand" style="margin-top:6px">
      <h1>Radyoloji <span class="accent">Pulse</span></h1>
    </div>
    <p class="tagline">Son <span id="window-days">7</span> günün radyoloji ve görüntüleme
      literatüründen öne çıkanlar; dergi ağırlığı ve makale tipine göre etki skoruyla sıralı.</p>
    <div class="ramp" aria-hidden="true"></div>
    <div class="stats" id="stats"></div>
    <div class="loadbar" style="margin-top:18px">
      <button class="chip" id="loadbtn">data.json yükle…</button>
      <input id="file" type="file" accept=".json,application/json" hidden>
      <span class="hint">Betiği çalıştırınca oluşan data.json'u seçip güncel veriyi gör</span>
    </div>
  </header>

  <div class="controls">
    <div class="chips" id="chips">
      <button class="chip" data-tier="all" aria-pressed="true">Tümü</button>
      <button class="chip" data-tier="1" aria-pressed="false">Tier 1</button>
      <button class="chip" data-tier="2" aria-pressed="false">Tier 2</button>
      <button class="chip" data-tier="3" aria-pressed="false">Tier 3</button>
    </div>
    <div class="search">
      <input id="q" type="search" placeholder="Başlık, dergi veya yazarda ara…" autocomplete="off">
    </div>
  </div>

  <main class="list" id="list">
    <div class="state"><h3>Hazırlanıyor…</h3></div>
  </main>

  <footer>
    <span>Kaynak: <a href="https://pubmed.ncbi.nlm.nih.gov/" target="_blank" rel="noopener">PubMed</a>
      · Her gün otomatik güncellenir</span>
    <span id="updated"></span>
  </footer>
</div>

<script>
const EMBEDDED_DATA = {
  "updated": "2026-06-14T14:53:27+00:00",
  "window_days": 7,
  "datetype": "edat",
  "count": 5,
  "tier1_count": 2,
  "source": "PubMed (NCBI E-utilities)",
  "articles": [
    {
      "pmid": "40000003",
      "title": "Patient-specific 3D-printed phantoms for ultrasound-guided biopsy rehearsal: a systematic review",
      "abstract": "Objective: To review phantom-based rehearsal methods. Conclusion: Phantoms improve accuracy.",
      "journal": "Eur Radiol",
      "date": "2026-06-11",
      "authors": [
        "Novak P",
        "Andersson E"
      ],
      "pubtypes": [
        "Journal Article",
        "Systematic Review",
        "Meta-Analysis"
      ],
      "doi": "10.1007/s00330-024-00003-x",
      "journal_tier": 1,
      "score": 153.0,
      "score_parts": {
        "journal": 100,
        "pubtype": 45,
        "recency": 8.0
      },
      "tier": 1
    },
    {
      "pmid": "40000001",
      "title": "Shear-wave elastography of the tongue in hypothyroid patients: a cross-sectional study",
      "abstract": "Background: Tongue stiffness may reflect systemic effects of hypothyroidism. Methods: 120 patients underwent shear-wave elastography. Results: Mean SWE was higher in patients.",
      "journal": "Radiology",
      "date": "2026-06-13",
      "authors": [
        "Yilmaz AY",
        "Demir K",
        "Koc M"
      ],
      "pubtypes": [
        "Journal Article",
        "Randomized Controlled Trial"
      ],
      "doi": "10.1148/radiol.240001",
      "journal_tier": 1,
      "score": 147.0,
      "score_parts": {
        "journal": 100,
        "pubtype": 35,
        "recency": 12.0
      },
      "tier": 1
    },
    {
      "pmid": "40000002",
      "title": "Deep learning for breast lesion characterization on DCE-MRI: a multicenter validation",
      "abstract": "Purpose: To validate a deep-learning model across five centers. Results: AUC 0.91.",
      "journal": "Radiol Artif Intell",
      "date": "2026-06-12",
      "authors": [
        "Schmidt L",
        "Rossi G",
        "Tan W"
      ],
      "pubtypes": [
        "Journal Article",
        "Multicenter Study",
        "Validation Study"
      ],
      "doi": "10.1148/ryai.240002",
      "journal_tier": 1,
      "score": 128.0,
      "score_parts": {
        "journal": 100,
        "pubtype": 18,
        "recency": 10.0
      },
      "tier": 2
    },
    {
      "pmid": "40000004",
      "title": "Prostatic artery embolization outcomes: a single-center experience",
      "abstract": "Purpose: Report 2-year outcomes of PAE. Results: Symptom improvement in most patients.",
      "journal": "J Vasc Interv Radiol",
      "date": "2026-06-09",
      "authors": [
        "Garcia R",
        "Mueller T",
        "Sato H"
      ],
      "pubtypes": [
        "Journal Article"
      ],
      "doi": "10.1016/j.jvir.2024.00004",
      "journal_tier": 2,
      "score": 64.0,
      "score_parts": {
        "journal": 60,
        "pubtype": 0,
        "recency": 4.0
      },
      "tier": 3
    },
    {
      "pmid": "40000005",
      "title": "An unusual presentation of a sacral chordoma: case report",
      "abstract": "We report a rare case with atypical imaging findings.",
      "journal": "Clin Radiol",
      "date": "2026-06-08",
      "authors": [
        "Brown J"
      ],
      "pubtypes": [
        "Journal Article",
        "Case Reports"
      ],
      "doi": "10.1016/j.crad.2024.00005",
      "journal_tier": 3,
      "score": 22.0,
      "score_parts": {
        "journal": 35,
        "pubtype": -15,
        "recency": 2.0
      },
      "tier": 3
    }
  ]
};

const state = { data:null, tier:"all", q:"" };

function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function fmtDate(iso){
  if(!iso) return "";
  const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return iso;
  const months=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  return `${parseInt(m[3])} ${months[parseInt(m[2])-1]} ${m[1]}`;
}
function authorLine(a){
  if(!a||!a.length) return "";
  if(a.length<=3) return a.join(", ");
  return a.slice(0,3).join(", ") + " ve diğerleri";
}
function articleUrl(a){
  if(a.doi) return "https://doi.org/"+a.doi;
  if(a.pmid) return "https://pubmed.ncbi.nlm.nih.gov/"+a.pmid+"/";
  return "#";
}

function renderStats(d){
  document.getElementById("window-days").textContent = d.window_days ?? 7;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${d.count||0}</div><div class="l">Makale</div></div>
    <div class="stat gold"><div class="n">${d.tier1_count||0}</div><div class="l">Tier 1</div></div>
    <div class="stat"><div class="n">${d.window_days||7}</div><div class="l">Gün</div></div>`;
  if(d.updated){
    const dt = new Date(d.updated);
    document.getElementById("updated").textContent =
      "Güncellendi: " + dt.toLocaleString("tr-TR",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"});
  }
}

function card(a, rank){
  const t = a.tier||3;
  const width = Math.max(6, Math.min(100, a.score/1.7));
  const tagged = (a.pubtypes||[]).filter(p=>p!=="Journal Article").slice(0,4);
  const tags = tagged.map(p=>`<span class="pt">${escapeHtml(p)}</span>`).join("");
  const abs = a.abstract ? `
      <div class="abstract" id="abs-${rank}">${escapeHtml(a.abstract)}</div>
      <button class="toggle" data-abs="${rank}">Özeti göster +</button>` : "";
  return `
  <article class="card t${t}">
    <div class="top">
      <div class="rank">#${rank}</div>
      <div class="head">
        <span class="badge t${t}">Tier ${t}</span>
        <h2 class="title"><a href="${articleUrl(a)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a></h2>
        <div class="meta">
          <span class="j">${escapeHtml(a.journal||"")}</span>
          <span class="dot">·</span><span>${fmtDate(a.date)}</span>
          ${a.pmid?`<span class="dot">·</span><a href="https://pubmed.ncbi.nlm.nih.gov/${a.pmid}/" target="_blank" rel="noopener">PMID ${a.pmid}</a>`:""}
        </div>
        ${authorLine(a.authors)?`<div class="authors">${escapeHtml(authorLine(a.authors))}</div>`:""}
        ${tags?`<div class="ptypes">${tags}</div>`:""}
        <div class="gauge"><div class="bar"><div class="fill" style="width:${width}%"></div></div>
          <span class="sval">${a.score}</span></div>
        ${abs}
      </div>
    </div>
  </article>`;
}

function render(){
  const d = state.data;
  if(!d){return;}
  let arts = d.articles||[];
  if(state.tier!=="all") arts = arts.filter(a=>String(a.tier)===state.tier);
  if(state.q){
    const q = state.q.toLowerCase();
    arts = arts.filter(a=>
      (a.title||"").toLowerCase().includes(q) ||
      (a.journal||"").toLowerCase().includes(q) ||
      (a.authors||[]).join(" ").toLowerCase().includes(q));
  }
  const list = document.getElementById("list");
  if(!arts.length){
    list.innerHTML = `<div class="state"><h3>Eşleşen makale yok</h3>
      <p>Filtreyi değiştir ya da aramayı temizle.</p></div>`;
    return;
  }
  list.innerHTML = arts.map((a,i)=>card(a,i+1)).join("");
  list.querySelectorAll(".toggle").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const el = document.getElementById("abs-"+btn.dataset.abs);
      const open = el.classList.toggle("open");
      btn.textContent = open ? "Özeti gizle −" : "Özeti göster +";
    });
  });
}

function bindControls(){
  document.querySelectorAll(".chip").forEach(c=>{
    c.addEventListener("click",()=>{
      document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed","false"));
      c.setAttribute("aria-pressed","true");
      state.tier = c.dataset.tier; render();
    });
  });
  document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value.trim();render();});
}

function boot(){
  bindControls();
  const fi = document.getElementById("file");
  const btn = document.getElementById("loadbtn");
  btn.addEventListener("click", ()=>fi.click());
  fi.addEventListener("change", ev=>{
    const f = ev.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        state.data = JSON.parse(r.result);
        renderStats(state.data); render();
        btn.textContent = "✓ " + (f.name || "yüklendi");
      }catch(e){
        alert("Bu dosya geçerli bir data.json değil.");
      }
    };
    r.readAsText(f);
  });
  // sayfa açılır açılmaz gömülü örnek veriyi göster
  state.data = EMBEDDED_DATA;
  renderStats(state.data); render();
}
boot();
</script>
</body>
</html>
